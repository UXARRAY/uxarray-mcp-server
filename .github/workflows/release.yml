name: Publish uxarray-mcp

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, e.g. v0.1.0"
        required: true

permissions:
  contents: read

jobs:
  test-build:
    if: github.repository == 'UXARRAY/uxarray-mcp-server'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Install wheel in a clean venv
        run: |
          uv venv /tmp/uxarray-mcp-wheel --python 3.12
          uv pip install --python /tmp/uxarray-mcp-wheel/bin/python dist/uxarray_mcp-*.whl
          /tmp/uxarray-mcp-wheel/bin/uxarray-mcp --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: test-build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true

  verify-pypi-install:
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install released wheel from PyPI
        env:
          REF_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          echo "Verifying uxarray-mcp==${version} from PyPI"
          uv venv /tmp/uxarray-mcp-pypi --python 3.12
          installed=0
          for attempt in 1 2 3 4 5; do
            if uv pip install --python /tmp/uxarray-mcp-pypi/bin/python \
                 --index-strategy unsafe-best-match \
                 "uxarray-mcp==${version}"; then
              installed=1
              break
            fi
            echo "PyPI install attempt ${attempt} failed; sleeping before retry."
            sleep 30
          done
          if [ "$installed" -ne 1 ]; then
            echo "Failed to install uxarray-mcp==${version} from PyPI after 5 attempts." >&2
            exit 1
          fi
          /tmp/uxarray-mcp-pypi/bin/uxarray-mcp --help
          /tmp/uxarray-mcp-pypi/bin/python -c "import uxarray_mcp; print(uxarray_mcp.__version__)"

  update-conda-feedstock:
    runs-on: ubuntu-latest
    needs: verify-pypi-install
    env:
      CONDA_FEEDSTOCK_REPOSITORY: ${{ vars.CONDA_FEEDSTOCK_REPOSITORY }}
      CONDA_FEEDSTOCK_TOKEN: ${{ secrets.CONDA_FEEDSTOCK_TOKEN }}
    steps:
      - name: Skip feedstock update when not configured
        if: env.CONDA_FEEDSTOCK_REPOSITORY == '' || env.CONDA_FEEDSTOCK_TOKEN == ''
        run: |
          echo "CONDA_FEEDSTOCK_REPOSITORY or CONDA_FEEDSTOCK_TOKEN is not configured; skipping feedstock PR."

      - name: Check out source repository
        if: env.CONDA_FEEDSTOCK_REPOSITORY != '' && env.CONDA_FEEDSTOCK_TOKEN != ''
        uses: actions/checkout@v4

      - name: Install uv
        if: env.CONDA_FEEDSTOCK_REPOSITORY != '' && env.CONDA_FEEDSTOCK_TOKEN != ''
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        if: env.CONDA_FEEDSTOCK_REPOSITORY != '' && env.CONDA_FEEDSTOCK_TOKEN != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution for hash
        if: env.CONDA_FEEDSTOCK_REPOSITORY != '' && env.CONDA_FEEDSTOCK_TOKEN != ''
        run: uv build --sdist

      - name: Check out feedstock
        if: env.CONDA_FEEDSTOCK_REPOSITORY != '' && env.CONDA_FEEDSTOCK_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONDA_FEEDSTOCK_REPOSITORY }}
          token: ${{ env.CONDA_FEEDSTOCK_TOKEN }}
          path: feedstock

      - name: Update feedstock recipe
        if: env.CONDA_FEEDSTOCK_REPOSITORY != '' && env.CONDA_FEEDSTOCK_TOKEN != ''
        run: |
          ref_name="${{ inputs.tag || github.ref_name }}"
          version="${ref_name#v}"
          python scripts/update_conda_recipe.py \
            --recipe feedstock/recipe/meta.yaml \
            --version "$version" \
            --sdist dist/uxarray_mcp-*.tar.gz

      - name: Open feedstock pull request
        if: env.CONDA_FEEDSTOCK_REPOSITORY != '' && env.CONDA_FEEDSTOCK_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.CONDA_FEEDSTOCK_TOKEN }}
        run: |
          ref_name="${{ inputs.tag || github.ref_name }}"
          version="${ref_name#v}"
          cd feedstock
          branch="uxarray-mcp-${version}"
          git config user.name "Rajeev Jain"
          git config user.email "rajeeja@gmail.com"
          git checkout -b "$branch"
          git add recipe/meta.yaml
          if git diff --cached --quiet; then
            echo "Feedstock recipe already up to date."
            exit 0
          fi
          git commit -m "Update uxarray-mcp to ${version}"
          git push origin "$branch"
          pr_url=$(gh pr create \
            --repo "$CONDA_FEEDSTOCK_REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "Update uxarray-mcp to ${version}" \
            --body "Automated conda-forge feedstock update for uxarray-mcp ${version}.")
          gh pr merge "$pr_url" --auto --squash --repo "$CONDA_FEEDSTOCK_REPOSITORY"

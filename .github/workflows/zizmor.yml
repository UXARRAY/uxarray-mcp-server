name: zizmor GitHub Actions audit

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit workflows with zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Run zizmor
        run: uvx zizmor .github/workflows/
